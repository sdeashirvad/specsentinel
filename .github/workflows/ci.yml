name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            engine/package-lock.json
            frontend/package-lock.json

      - name: Install engine dependencies
        working-directory: engine
        run: npm ci

      - name: Build engine
        working-directory: engine
        run: npm run build

      - name: Pack engine tarball for frontend
        working-directory: engine
        run: npm pack --pack-destination .

      - name: Build frontend and populate webview assets
        working-directory: frontend
        run: |
          npm ci
          npm install ../engine/specsentinel-*.tgz
          npm run build:webview
          rm -rf ../engine/assets/webview
          mkdir -p ../engine/assets/webview
          cp -r dist/. ../engine/assets/webview/

      - name: Run engine tests
        working-directory: engine
        run: npm run test:node

      - name: Validate package
        working-directory: engine
        run: npm run validate
