<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#09090b"/>
      <stop offset="45%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="glow" x1="900" y1="80" x2="1150" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="980" cy="120" r="180" fill="url(#glow)" filter="url(#blur)"/>
  <circle cx="200" cy="520" r="120" fill="#4f46e5" fill-opacity="0.12" filter="url(#blur)"/>

  <!-- Subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Logo mark -->
  <rect x="80" y="200" width="88" height="88" rx="20" fill="url(#accent)"/>
  <path d="M124 228c-8 0-14 6-14 14v8c0 4-3 7-7 7h-10c-3 0-5 3-3 5l14 20c2 3 6 3 8 0l14-20c2-2 0-5-3-5h-10c-4 0-7-3-7-7v-8c0-8-6-14-14-14z" fill="#ffffff"/>

  <!-- Title block -->
  <text x="200" y="238" fill="#fafafa" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="64" font-weight="700" letter-spacing="-1.5">SpecSentinel</text>
  <text x="200" y="296" fill="#a1a1aa" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="28" font-weight="500">Catch API breaking changes before production</text>
  <text x="200" y="348" fill="#71717a" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="20">OpenAPI contract diff · CI gates · PR comments · governance</text>

  <!-- npm install pill -->
  <rect x="200" y="390" width="420" height="52" rx="12" fill="#18181b" stroke="#3f3f46" stroke-width="1.5"/>
  <text x="224" y="424" fill="#e4e4e7" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">npm install -g specsentinel</text>
  <rect x="640" y="398" width="72" height="36" rx="8" fill="#18181b" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="676" y="422" fill="#a5b4fc" font-family="system-ui, sans-serif" font-size="16" font-weight="600" text-anchor="middle">v1.0.0</text>

  <!-- Product proof strip -->
  <rect x="720" y="200" width="400" height="242" rx="16" fill="#18181b" fill-opacity="0.85" stroke="#27272a" stroke-width="1.5"/>
  <rect x="748" y="228" width="52" height="26" rx="6" fill="#450a0a" stroke="#7f1d1d" stroke-width="1"/>
  <text x="774" y="246" fill="#fca5a5" font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">HIGH</text>
  <text x="816" y="246" fill="#fafafa" font-family="system-ui, sans-serif" font-size="15" font-weight="600">Risk score 61</text>
  <text x="748" y="282" fill="#f87171" font-family="ui-monospace, monospace" font-size="13" font-weight="600">BREAKING</text>
  <text x="848" y="282" fill="#d4d4d8" font-family="ui-monospace, monospace" font-size="13">DELETE /products/{id}</text>
  <text x="748" y="312" fill="#f87171" font-family="ui-monospace, monospace" font-size="13" font-weight="600">BREAKING</text>
  <text x="848" y="312" fill="#d4d4d8" font-family="ui-monospace, monospace" font-size="13">required field removed</text>
  <text x="748" y="342" fill="#4ade80" font-family="ui-monospace, monospace" font-size="13" font-weight="600">SAFE</text>
  <text x="808" y="342" fill="#d4d4d8" font-family="ui-monospace, monospace" font-size="13">GET /inventory added</text>
  <text x="748" y="410" fill="#71717a" font-family="system-ui, sans-serif" font-size="13">Sample contract diff output</text>

  <!-- Footer -->
  <text x="80" y="580" fill="#71717a" font-family="system-ui, sans-serif" font-size="18" font-weight="500">SdeAshirvad Labs</text>
  <text x="80" y="608" fill="#52525b" font-family="system-ui, sans-serif" font-size="14">labs.sdeashirvad.com/specsentinel</text>
  <text x="1120" y="594" fill="#52525b" font-family="system-ui, sans-serif" font-size="14" text-anchor="end">npmjs.com/package/specsentinel</text>
</svg>
